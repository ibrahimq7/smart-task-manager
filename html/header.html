<header class="topbar">
  <div>
    <p class="eyebrow">Command center</p>
    <h1>Plan the right work, at the right time.</h1>
  </div>
  <div class="toolbar">
    <button id="themeBtn" class="btn">Theme</button>
    <button id="exportBtn" class="btn">Export</button>
    <label class="btn ghost" for="importFile">Import

    <button id="clearBtn" class="btn danger">Reset</button>
  </div>
</header>
